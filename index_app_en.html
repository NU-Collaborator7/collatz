<!DOCTYPE html>
<html lang="en">
<body style="background:MidnightBlue; color:White; font-family:sans-serif; max-width:420px; margin:20px auto; padding:0 10px">
  <h2 style="color:SkyBlue; text-align:center; letter-spacing:2px">COLLATZ CONJECTURE</h2>
  
  <div style="display:flex; gap:10px; margin-bottom:20px">
    <input type="number" id="n" placeholder="Enter number" style="flex:1; background:transparent; border:2px solid SkyBlue; color:White; padding:10px; border-radius:8px; outline:none">
    <button onclick="run()" style="background:SkyBlue; border:none; color:MidnightBlue; font-weight:bold; padding:10px 20px; border-radius:8px; cursor:pointer">GO</button>
  </div>

  <div id="stat" style="font-size:14px; margin-bottom:10px; color:SkyBlue; display:flex; justify-content:space-around; font-weight:bold"></div>
  <div style="height:200px; background:rgba(255,255,255,0.05); border-radius:12px; padding:10px; margin-bottom:20px"><canvas id="c"></canvas></div>
  <div id="log" style="height:150px; overflow-y:auto; font-size:14px; border-top:1px solid SkyBlue; padding-top:15px; scrollbar-width:thin"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    let ch;
    function run() {
      let v = parseInt(document.getElementById('n').value), seq = [v], h = '';
      if (!v || v < 1) return;

      while (v > 1) {
        let e = v % 2 === 0;
        h += `<div style="color:${e?'White':'SkyBlue'}">${v} ${e ? '→ /2' : '→ *3+1'}</div>`;
        v = e ? v / 2 : v * 3 + 1;
        seq.push(v);
      }

      document.getElementById('log').innerHTML = h + "<b>Final: 1</b>";
      document.getElementById('stat').innerHTML = `<span>Steps: ${seq.length-1}</span><span>Peak: ${Math.max(...seq)}</span>`;
      
      if (ch) ch.destroy();
      ch = new Chart(document.getElementById('c'), {
        type: 'line',
        data: { labels: seq.map((_, i) => i), datasets: [{ data: seq, borderColor: 'SkyBlue', borderWidth: 3, pointRadius: 0, tension: 0.3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: 0 }, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'SkyBlue' } } } }
      });
    }
  </script>
</body>
</html>
