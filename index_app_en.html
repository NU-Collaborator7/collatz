<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collatz Simulator</title>
</head>
<body style="background:MidnightBlue; color:White; font-family:sans-serif; max-width:480px; margin:0 auto; padding:20px; line-height:1.4">
  <h2 style="color:SkyBlue; text-align:center; margin-bottom:10px">Collatz Conjecture</h2>
  
  <p style="font-size:12px; margin-bottom:15px">
    The Collatz Conjecture states that for any positive integer, if you repeat the operation of dividing it by 2 if it is even, or multiplying it by 3 and adding 1 if it is odd, it will always eventually reach 1. Proposed by Lothar Collatz in 1937.
  </p>

  <div style="display:flex; gap:8px; margin-bottom:15px">
    <input type="number" id="n" placeholder="Enter number" style="flex:1; background:transparent; border:1px solid SkyBlue; color:White; padding:8px; border-radius:4px">
    <button onclick="run()" style="background:SkyBlue; border:0; color:MidnightBlue; font-weight:bold; padding:8px 15px; border-radius:4px; cursor:pointer">RUN</button>
  </div>

  <div id="stat" style="font-size:12px; color:SkyBlue; display:flex; justify-content:space-between; margin-bottom:10px"></div>
  <div style="height:180px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:15px"><canvas id="c"></canvas></div>
  <div id="log" style="height:150px; overflow-y:auto; font-size:12px; border-top:1px solid SkyBlue; padding-top:10px"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    let ch;
    function run() {
      let v = parseInt(document.getElementById('n').value), seq = [v], h = '';
      if (!v || v < 1) return;
      while (v > 1) {
        let e = v % 2 === 0;
        h += `<div style="color:${e?'White':'SkyBlue'}">${v} ${e ? '→ /2' : '→ *3+1'}</div>`;
        v = e ? v / 2 : v * 3 + 1;
        seq.push(v);
      }
      document.getElementById('log').innerHTML = h + "<b>Done: 1</b>";
      document.getElementById('stat').innerHTML = `<span>Steps: ${seq.length-1}</span><span>Max: ${Math.max(...seq)}</span>`;
      if (ch) ch.destroy();
      ch = new Chart(document.getElementById('c'), {
        type: 'line',
        data: { labels: seq.map((_, i) => i), datasets: [{ data: seq, borderColor: 'SkyBlue', borderWidth: 2, pointRadius: 0, tension: 0.2 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: 0 }, scales: { x: { display: false }, y: { ticks: { color: 'SkyBlue', font: { size: 10 } } } } }
      });
    }
  </script>
</body>
</html>
