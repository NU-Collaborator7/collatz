<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collatz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  body{background:black;color:white;font:14px Inter,sans-serif;max-width:400px;margin:20px auto;padding:20px}
  input,button{background:black;border:1px solid white;color:white;padding:8px;border-radius:4px;font:inherit}
  button{background:white;color:black;font-weight:700}
  #c-box{height:150px;margin:10px 0}
  #log{height:120px;overflow:auto;font-size:10px;border-top:1px solid gray}
  .e{color:gray} .o{color:lime}
</style>
</head>
<body>
<h1 style="color:lime;font-size:18px">Collatz</h1>
<div style="display:flex;gap:5px">
  <input id="n" type="number" placeholder="Value" style="flex:1">
  <button onclick="run()">RUN</button>
  <button onclick="reset()" style="background:none;color:white;border:none">✕</button>
</div>
<div id="c-box"><canvas id="c"></canvas></div>
<div id="log">Ready</div>
<script>
let ctx=document.getElementById('c'), chart=new Chart(ctx,{type:'line',data:{labels:[],datasets:[]},options:{responsive:1,maintainAspectRatio:0,plugins:{legend:0},scales:{x:{display:0},y:{grid:{color:'dimgray'}}}}});
function run(){
  let v=parseInt(document.getElementById('n').value); if(!v||v<1)return;
  let seq=[v], logs='', max=v;
  while(v>1){
    if(v%2==0){ logs+=`<span class="e">${v}→${v/2}</span><br>`; v/=2; }
    else{ logs+=`<span class="o">${v}→${3*v+1}</span><br>`; v=3*v+1; }
    seq.push(v); if(v>max)max=v;
  }
  document.getElementById('log').innerHTML=logs+`<b class="o">Steps: ${seq.length-1} | Max: ${max}</b>`;
  chart.data.labels=seq.map((_,i)=>i);
  chart.data.datasets=[{data:seq,borderColor:'lime',pointRadius:0,borderWidth:2,tension:0.1}];
  chart.update();
}
function reset(){document.getElementById('n').value='';document.getElementById('log').innerHTML='Ready';chart.data.datasets=[];chart.update();}
</script>
</body>
</html>
