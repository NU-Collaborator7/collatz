<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コラッツ予想の計算アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  body { background:#111; color:#ccc; font:14px/1.6 monospace; margin:0; padding:16px; }
  h1 { color:#0f9; font-size:16px; margin:0 0 12px; }
  .row { display:flex; gap:8px; margin-bottom:12px; align-items:center; }
  input { background:#222; border:1px solid #444; color:#0f9; font:14px monospace; padding:6px 10px; border-radius:4px; width:120px; }
  button { background:#0f9; color:#111; border:none; border-radius:4px; padding:6px 14px; font:bold 13px monospace; cursor:pointer; }
  #clear { background:#333; color:#888; }
  .chart-box { background:#1a1a1a; border:1px solid #333; border-radius:6px; padding:10px; height:200px; margin-bottom:12px; }
  #log { background:#1a1a1a; border:1px solid #333; border-radius:6px; padding:10px; height:340px; overflow-y:auto; font-size:12px; }
  .even { color:#4db8ff; display:block; }
  .odd  { color:#ff9f43; display:block; }
  .done { color:#0f9;    display:block; font-weight:bold; margin-top:4px; }
</style>
</head>
<body>
<h1>コラッツ予想の計算アプリ</h1>
<HR color="white">
コラッツ予想(The Collatz Conjecture)は、「どんな正の整数も、偶数なら2で割り、奇数なら3倍して1を足すという操作を繰り返せば、必ず最後は1にたどり着く」 という予測です。Lothar Collatz1が1937年が提唱しましたが、今なお、証明されていないので予測のままです。
<HR color="white">
<div class="row">
  <input id="n" type="number" min="1" placeholder="整数" />
  <button onclick="run()">▶ 実行</button>
  <button id="clear" onclick="clearAll()">✕</button>
</div>
<div class="chart-box"><canvas id="c"></canvas></div>
<div id="log">数字を入力して実行してください</div>
 
<script>
const chart = new Chart('c', {
  type:'line', data:{labels:[],datasets:[]},
  options:{
    responsive:true, maintainAspectRatio:false, animation:{duration:300},
    plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{color:'#666',maxTicksLimit:10},grid:{color:'#222'}},
      y:{ticks:{color:'#666'},grid:{color:'#222'}}
    }
  }
});
 
function collatz(n) {
  const seq=[n], logs=[];
  while (n>1) {
    if (n%2===0) {
      const r=n/2;
      logs.push({t:'even',s:`${n} は偶数 → 2で割る`});
      logs.push({t:'even',s:`  ${n} ÷ 2 = ${r}`});
      n=r;
    } else {
      const r=3*n+1;
      logs.push({t:'odd',s:`${n} は奇数 → 3を掛けて1を足す`});
      logs.push({t:'odd',s:`  3 × ${n} + 1 = ${r}`});
      n=r;
    }
    seq.push(n);
  }
  return {seq, logs};
}
 
function run() {
  const n = parseInt(document.getElementById('n').value);
  if (!n||n<1) return;
  const {seq,logs} = collatz(n);
 
  const log = document.getElementById('log');
  log.innerHTML = '';
  logs.forEach(({t,s})=>{ const e=document.createElement('span'); e.className=t; e.textContent=s; log.appendChild(e); });
  const done=document.createElement('span'); done.className='done';
  done.textContent=`完了 — ${seq.length-1} ステップ、最大値 ${Math.max(...seq).toLocaleString()}`;
  log.appendChild(done);
 
  chart.data.labels = seq.map((_,i)=>i);
  chart.data.datasets = [{
    data:seq, borderColor:'#0f9', borderWidth:1.5,
    pointBackgroundColor: seq.map(v=>v%2===0?'#4db8ff':'#ff9f43'),
    pointRadius:3, fill:false, tension:0.2
  }];
  chart.update();
}
 
function clearAll() {
  document.getElementById('n').value='';
  document.getElementById('log').innerHTML='数字を入力して実行してください';
  chart.data.labels=[]; chart.data.datasets=[]; chart.update();
}
 
document.getElementById('n').addEventListener('keydown',e=>e.key==='Enter'&&run());
</script>
</body>
</html>
